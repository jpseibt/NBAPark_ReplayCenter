<!DOCTYPE html> <html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Operator Console</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>

</head>
<body class="operator-body">


  <div class="operator-header">
    <button class="btn btn-fullscreen" onclick="document.documentElement.requestFullscreen(); this.style.display='none'">
      ⛶ Fullscreen
    </button>
    <img src="/static/assets/nba_replay_center.png" class="brand-logo-op" alt="NBA Replay Center">
    <div id="online-stats" class="operator-stats">Network: 0/6 Online </div>
  </div>

  <div class="operator-controls">
    <div class="controls-gameplay">
      <button class="btn btn-op btn-op-start" onclick="send_command('START_QUESTION')">
        <span class="glow-text">▶ START</span>
      </button>
      <button class="btn btn-op btn-op-replay" onclick="send_command('REPLAY')">
        <span class="glow-text">◀◀ REPLAY</span>
      </button>
      <button class="btn btn-op btn-op-reveal" onclick="send_command('REVEAL')">
        <span class="glow-text">👁 REVEAL</span>
      </button>
    </div>
    <div class="controls-system">
      <button class="btn btn-op btn-op-results" onclick="send_command('RESULTS')">
        <span class="glow-text">▤ RESULTS</span>
      </button>
      <button class="btn btn-op btn-op-reset" onclick="send_command('RESET')">
        <span class="glow-text">⏹ RESET</span>
      </button>
    </div>
  </div>

  <div class="operator-preview">
    <h3 id="preview-stage">STAGE: IDLE</h3>
    <h2 id="preview-text">Loading...</h2>
  </div>

  <table class="operator-matrix">
    <thead>
      <tr>
        <th>Slot</th>
        <th>Network</th>
        <th>Score</th>
        <th>Current Selection</th>
        <th>Lock Status</th>
      </tr>
    </thead>
    <tbody id="matrix-body">
      <!-- Rows generated by JS -->
    </tbody>
  </table>


  <script src="/static/admin.js"></script>
</body>
</html>
