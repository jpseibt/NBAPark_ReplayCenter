<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Operator - Replay Center</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
</head>
<body class="operator-body">


  <div class="operator-header">
    <button class="btn btn-fullscreen" onclick="document.documentElement.requestFullscreen(); this.style.display='none'">
      ⛶ Fullscreen
    </button>
    <img src="/static/assets/nba_replay_center.png" class="brand-logo-op" alt="NBA Replay Center">
    <div id="online-stats" class="operator-stats">Network: 0/6 Online </div>
  </div>

  <div class="operator-controls">
    <div class="controls-left">
      <div class="controls-gameplay">
        <button id="btn-op-start" class="btn btn-op" onclick="send_command('START_QUESTION')">
          <span class="glow-text">▶| START</span>
        </button>
        <button id="btn-op-replay" class="btn btn-op" onclick="send_command('REPLAY')">
          <span class="glow-text">◀◀ REPLAY</span>
        </button>
        <button id="btn-op-reveal" class="btn btn-op" onclick="send_command('REVEAL')">
          <span class="glow-text">👁 REVEAL</span>
        </button>
      </div>
      <div class="controls-transport">
        <button id="btn-trans-rev" class="btn btn-op btn-op-transport" onclick="send_command('T_REVERSE')">
          <span class="glow-text">◀</span>
        </button>
        <button id="btn-trans-pause" class="btn btn-op btn-op-transport" onclick="send_command('T_PAUSE')">
          <span class="glow-text">| |</span>
        </button>
        <button id="btn-trans-fwd" class="btn btn-op btn-op-transport" onclick="send_command('T_FORWARD')">
          <span class="glow-text">▶</span>
        </button>
        <button id="btn-trans-speed" class="btn btn-op btn-op-transport" onclick="send_command('T_SLOW_TOGGLE')">
          <span class="glow-text">▷|</span>
        </button>
      </div>
    </div>

    <div class="controls-routing">
      <div class="tv-grid">
        <button id="btn-video-4" class="btn btn-op btn-op-video" onclick="send_command('TOGGLE_VIDEO_4')">
          <span class="glow-text">TV 4</span>
        </button>
        <button id="btn-video-3" class="btn btn-op btn-op-video" onclick="send_command('TOGGLE_VIDEO_3')">
          <span class="glow-text">TV 3</span>
        </button>
        <button id="btn-video-2" class="btn btn-op btn-op-video" onclick="send_command('TOGGLE_VIDEO_2')">
          <span class="glow-text">TV 2</span>
        </button>
        <button id="btn-video-1" class="btn btn-op btn-op-video" onclick="send_command('TOGGLE_VIDEO_1')">
          <span class="glow-text">TV 1</span>
        </button>
      </div>
      <button id="btn-video-all" class="btn btn-op btn-op-video-all" onclick="send_command('SELECT_ALL_VIDEOS')">
        <span class="glow-text">SELECT ALL</span>
      </button>
    </div>

    <div class="controls-system">
      <button id="btn-op-results" class="btn btn-op" onclick="send_command('RESULTS')">
        <span class="glow-text">▤ RESULTS</span>
      </button>
      <button id="btn-op-reset" class="btn btn-op" onclick="send_command('RESET')">
        <span class="glow-text">⏹ RESET</span>
      </button>
    </div>
  </div>

  <div class="operator-preview">
    <h3 id="preview-stage">STAGE: IDLE</h3>
    <h2 id="preview-text">Loading...</h2>
  </div>

  <table class="operator-matrix">
    <thead>
      <tr>
        <th>Slot</th>
        <th>Network</th>
        <th>Score</th>
        <th>Current Selection</th>
        <th>Lock Status</th>
      </tr>
    </thead>
    <tbody id="matrix-body">
      <!-- Rows generated by JS -->
    </tbody>
  </table>

  <dialog id="confirm-dialog" class="operator-dialog">
    <h3>CONFIRM COMMAND</h3>
    <p id="dialog-message">_</p>
    <div class="dialog-actions">
      <button class="btn btn-op btn-op-confirm" id="dialog-btn-confirm">
        <span class="glow-text">YES</span>
      </button>
      <button class="btn btn-op btn-op-cancel" id="dialog-btn-cancel">
        <span class="glow-text">CANCEL</span>
      </button>
    </div>
  </dialog>

  <script src="/static/admin.js"></script>
</body>
</html>
